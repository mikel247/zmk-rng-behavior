description: |
  ZMK RNG Typer behavior.
  Uses the nRF52 hardware RNG (TRNG) to type random output.

  Binding parameters:
    param1 encodes mode + optional Enter flag:
      Bits [3:0] = mode
        0 = DICE   -> types "dN: X"  (param2 = sides, e.g. 6 / 8 / 10 / 12 / 20 / 100)
        1 = INT    -> types full raw 32-bit value (param2 ignored)
        2 = STRING -> types a 16-char random string (param2 = charset, see below)
      Bit 7 (0x80) = send Enter after output

    param2:
      DICE mode   -> number of die sides (2+, default 6)
      INT  mode   -> ignored; always full uint32
      STRING mode:
        0 = alphanumeric  a-z A-Z 0-9
        1 = hex           0-9 a-f
        2 = lowercase     a-z 0-9
        3 = symbols       alphanumeric + !@#$%^&*()-_=+[]{}

compatible: "zmk,behavior-rng-typer"

include: behavior.yaml

properties:
  "#binding-cells":
    type: int
    const: 2

binding-cells:
  - param1
  - param2
